.quote-card::before {

.quote-bar {

  width: 3px;

.quote-text {

  transition: color 0.2s, border-color 0.2s;
}

.shuffle:hover {

}

.theme-switch {
  position: fixed; bottom: 1rem; right: 1rem;

  background: var(--border);
  cursor: pointer;

.theme-switch .knob {

}

[data-theme="light"] .theme-switch .knob { transform: translateX(20px); }
