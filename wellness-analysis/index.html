<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Analysis | Chaos Console</title>
<meta name="description" content="Wellness Analysis turns Apple Health and RingConn data into a readable recovery narrative with clear trends and monthly insight.">
<meta name="theme-color" content="#f4efe6">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="preload" href="/fonts/archivo-black-subset.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="/fonts/fraunces-italic-subset.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="/fonts/jetbrains-mono-subset.ttf" as="font" type="font/ttf" crossorigin>
<style>
@font-face {
  font-family: "Archivo Black";
  src: url("/fonts/archivo-black-subset.ttf") format("truetype");
  font-style: normal;
  font-weight: 400;
  font-display: swap;
}

@font-face {
  font-family: "Fraunces";
  src: url("/fonts/fraunces-italic-subset.ttf") format("truetype");
  font-style: italic;
  font-weight: 400;
  font-display: swap;
}

@font-face {
  font-family: "JetBrains Mono";
  src: url("/fonts/jetbrains-mono-subset.ttf") format("truetype");
  font-style: normal;
  font-weight: 500;
  font-display: swap;
}

:root {
  --bg: #f4efe6;
  --paper: rgba(255, 251, 245, 0.92);
  --paper-strong: rgba(255, 253, 250, 0.98);
  --border: rgba(84, 71, 55, 0.14);
  --border-strong: rgba(84, 71, 55, 0.22);
  --text: #201b17;
  --muted: #665b51;
  --subtle: #9d9084;
  --accent: #0c7c59;
  --accent-2: #22577a;
  --accent-3: #d97706;
  --accent-4: #b42318;
  --accent-5: #7c3aed;
  --score-hi: #0c7c59;
  --score-mid: #c0841a;
  --score-low: #b42318;
  --shadow: 0 24px 48px rgba(77, 56, 36, 0.09);
  --display: "Archivo Black", Impact, sans-serif;
  --accent-display: "Fraunces", Georgia, serif;
  --body: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  background:
    radial-gradient(circle at top left, rgba(12, 124, 89, 0.16), transparent 30%),
    radial-gradient(circle at top right, rgba(34, 87, 122, 0.12), transparent 28%),
    linear-gradient(180deg, #efe9df 0%, #f7f2ea 40%, #f4efe6 100%);
}

body {
  margin: 0;
  min-height: 100vh;
  background: transparent;
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(79, 61, 44, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79, 61, 44, 0.025) 1px, transparent 1px);
  background-size: 36px 36px;
  mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.75), transparent 92%);
  opacity: 0.3;
  pointer-events: none;
}

a {
  color: inherit;
}

.page-shell {
  width: min(1320px, calc(100% - 40px));
  margin: 0 auto;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(18px);
  background: rgba(244, 239, 230, 0.8);
  border-bottom: 1px solid rgba(84, 71, 55, 0.08);
}

.topbar-inner {
  min-height: 76px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}

.topbar-brand,
.eyebrow,
.meta-line,
.score-label,
.glance-kicker,
.metric-label,
.section-kicker,
.relation-label,
.footer-copy {
  font-family: var(--mono);
}

.topbar-brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.topbar-mark {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-3);
  background: rgba(255, 255, 255, 0.45);
}

.topbar-title {
  font-size: 0.76rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
}

.topbar-meta {
  color: var(--subtle);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.page {
  padding: 30px 0 50px;
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 1.08fr) minmax(340px, 0.92fr);
  gap: 20px;
  margin-bottom: 20px;
}

.hero-card,
.panel,
.glance-card,
.metric-card,
.relation-card,
.month-card {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--paper);
  box-shadow: var(--shadow);
}

.hero-card,
.panel {
  border-radius: 30px;
}

.hero-card::after,
.panel::after,
.glance-card::after,
.metric-card::after,
.relation-card::after,
.month-card::after {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: inherit;
  border: 1px solid rgba(255, 255, 255, 0.4);
  pointer-events: none;
}

.hero-copy-card {
  padding: 30px;
  background:
    radial-gradient(circle at top left, rgba(12, 124, 89, 0.18), transparent 26%),
    linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.92));
}

.eyebrow {
  margin: 0 0 12px;
  color: var(--accent-2);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.hero-title {
  margin: 0;
  font-family: var(--display);
  font-size: clamp(3rem, 7vw, 5.6rem);
  line-height: 0.9;
  letter-spacing: -0.05em;
}

.hero-title em {
  color: var(--accent-3);
  font-family: var(--accent-display);
  font-style: italic;
}

.hero-copy {
  margin: 18px 0 0;
  max-width: 48ch;
  color: var(--muted);
  font-size: clamp(1rem, 1.5vw, 1.08rem);
  line-height: 1.75;
}

.meta-line {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 22px;
}

.meta-pill {
  padding: 9px 12px;
  border-radius: 999px;
  border: 1px solid rgba(84, 71, 55, 0.12);
  background: rgba(255, 255, 255, 0.55);
  color: var(--muted);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.score-card {
  padding: 28px;
  display: grid;
  align-content: space-between;
  background:
    radial-gradient(circle at top right, rgba(34, 87, 122, 0.18), transparent 30%),
    linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.96));
}

.score-label {
  color: var(--subtle);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.score-value {
  margin: 16px 0 0;
  font-family: var(--display);
  font-size: clamp(4rem, 9vw, 6rem);
  line-height: 0.88;
  letter-spacing: -0.07em;
}

.score-value.good {
  color: var(--score-hi);
}

.score-value.mixed {
  color: var(--score-mid);
}

.score-value.low {
  color: var(--score-low);
}

.score-status {
  margin: 12px 0 0;
  font-family: var(--display);
  font-size: 1.5rem;
  line-height: 0.98;
  letter-spacing: -0.04em;
}

.score-summary {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 0.98rem;
  line-height: 1.65;
}

.score-delta {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid rgba(84, 71, 55, 0.12);
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.6;
}

.score-delta strong {
  color: var(--text);
}

.glance-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.glance-card {
  border-radius: 24px;
  padding: 20px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.76)),
    linear-gradient(180deg, rgba(12,124,89,0.05), rgba(34,87,122,0.02));
}

.glance-kicker {
  margin-bottom: 10px;
  color: var(--accent);
  font-size: 0.66rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.glance-title {
  margin: 0;
  font-family: var(--display);
  font-size: 1.4rem;
  line-height: 1;
  letter-spacing: -0.04em;
}

.glance-copy {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 0.93rem;
  line-height: 1.6;
}

.metric-strip {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.metric-card {
  border-radius: 22px;
  padding: 18px;
  background: rgba(255,255,255,0.82);
}

.metric-value {
  display: block;
  font-family: var(--display);
  font-size: 1.85rem;
  line-height: 1;
  letter-spacing: -0.04em;
}

.metric-delta {
  margin-top: 8px;
  font-size: 0.9rem;
}

.metric-delta.positive {
  color: var(--accent);
}

.metric-delta.negative {
  color: var(--accent-4);
}

.metric-label {
  display: block;
  margin-top: 10px;
  color: var(--subtle);
  font-size: 0.64rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.panel {
  padding: 24px;
  margin-bottom: 20px;
}

.panel-head {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 18px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.section-kicker {
  margin-bottom: 10px;
  color: var(--subtle);
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.panel-title {
  margin: 0;
  font-family: var(--display);
  font-size: clamp(1.8rem, 3vw, 2.8rem);
  line-height: 0.96;
  letter-spacing: -0.04em;
}

.panel-copy {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 0.96rem;
  line-height: 1.7;
  max-width: 58ch;
}

.panel-meta {
  color: var(--subtle);
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.analysis-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 20px;
}

.chart-wrap {
  position: relative;
  height: 320px;
}

.chart-wrap.tall {
  height: 360px;
}

.narrative-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
  gap: 20px;
}

.relation-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.relation-card {
  border-radius: 22px;
  padding: 18px;
  background: rgba(255,255,255,0.78);
}

.relation-label {
  color: var(--subtle);
  font-size: 0.64rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.relation-title {
  margin: 10px 0 0;
  font-family: var(--display);
  font-size: 1.25rem;
  line-height: 1;
  letter-spacing: -0.04em;
}

.relation-copy {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 0.92rem;
  line-height: 1.6;
}

.month-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.month-card {
  border-radius: 22px;
  padding: 18px;
  background: rgba(255,255,255,0.78);
}

.month-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: start;
}

.month-name {
  margin: 0;
  font-family: var(--display);
  font-size: 1.25rem;
  line-height: 1;
  letter-spacing: -0.04em;
}

.month-score {
  font-family: var(--display);
  font-size: 1.45rem;
  line-height: 1;
  letter-spacing: -0.04em;
}

.month-meta {
  display: grid;
  gap: 8px;
  margin-top: 12px;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.55;
}

.footer {
  margin-top: 8px;
}

.footer-card {
  padding: 22px 24px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.74);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
}

.footer-note {
  margin: 0;
  color: var(--muted);
  font-size: 0.95rem;
}

.footer-copy {
  color: var(--subtle);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.loading,
.error {
  padding: 80px 0;
  text-align: center;
  color: var(--muted);
  font-size: 1rem;
}

@media (max-width: 1120px) {
  .hero,
  .analysis-grid,
  .narrative-grid {
    grid-template-columns: 1fr;
  }

  .glance-grid,
  .metric-strip {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 760px) {
  .page-shell {
    width: min(1320px, calc(100% - 24px));
  }

  .topbar-inner,
  .panel-head,
  .footer-card {
    flex-direction: column;
    align-items: flex-start;
  }

  .hero-card,
  .panel,
  .glance-card,
  .metric-card,
  .relation-card,
  .month-card {
    border-radius: 24px;
  }

  .hero-copy-card,
  .score-card,
  .panel,
  .glance-card {
    padding: 20px;
  }

  .glance-grid,
  .metric-strip,
  .relation-grid,
  .month-grid {
    grid-template-columns: 1fr;
  }

  .chart-wrap,
  .chart-wrap.tall {
    height: 300px;
  }
}

@media (prefers-reduced-motion: reduce) {
  html {
    scroll-behavior: auto;
  }

  *,
  *::before,
  *::after {
    transition-duration: 0ms !important;
    animation-duration: 0ms !important;
  }
}
</style>

<header class="topbar">
  <div class="page-shell topbar-inner">
    <a class="topbar-brand" href="/index.html" aria-label="Return to Chaos Console">
      <span class="topbar-mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M41 20C36.8 17.2 30.5 17 25.8 19.5C21.1 22.1 18 26.8 18 32C18 37.2 21.1 41.9 25.8 44.5C30.5 47 36.8 46.8 41 44" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="topbar-title">Chaos Console</span>
    </a>
    <div class="topbar-meta" id="dateRange">Loading wellness range...</div>
  </div>

<main class="page">
  <div class="page-shell" id="app">
    <div class="loading">Loading wellness analysis...</div>
  </div>

<script>
const app = document.getElementById("app");
let recoveryChart = null;
let cardioChart = null;
let sleepChart = null;
let monthChart = null;

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function average(values) {
  const clean = values.filter(value => Number.isFinite(value));
  if (!clean.length) return null;
  return clean.reduce((sum, value) => sum + value, 0) / clean.length;
}

function sum(values) {
  const clean = values.filter(value => Number.isFinite(value));
  if (!clean.length) return null;
  return clean.reduce((total, value) => total + value, 0);
}

function countFinite(values) {
  return values.filter(value => Number.isFinite(value)).length;
}

function formatDate(iso, options = { month: "short", day: "numeric", year: "numeric" }) {
  return new Date(`${iso}T12:00:00`).toLocaleDateString("en-US", options);
}

function formatMonthLabel(isoMonth) {
  return new Date(`${isoMonth}-01T12:00:00`).toLocaleDateString("en-US", { month: "short", year: "numeric" });
}

function signed(value, digits = 1) {
  if (!Number.isFinite(value)) return "—";
  return `${value > 0 ? "+" : ""}${value.toFixed(digits)}`;
}

function formatMetric(value, digits = 1, suffix = "") {
  if (!Number.isFinite(value)) return "--";
  return `${value.toFixed(digits)}${suffix}`;
}

function formatWhole(value, suffix = "") {
  if (!Number.isFinite(value)) return "--";
  return `${Math.round(value)}${suffix}`;
}

function formatHours(value) {
  return formatMetric(value, 1, "h");
}

function formatPercent(value) {
  return formatMetric(value, 0, "%");
}

function formatBpm(value) {
  return formatWhole(value, " bpm");
}

function formatMs(value) {
  return formatWhole(value, " ms");
}

function formatMinutesFromHours(value) {
  if (!Number.isFinite(value)) return "--";
  return `${Math.round(value * 60)} min`;
}

function formatCount(value, singular, plural = `${singular}s`) {
  return `${value} ${value === 1 ? singular : plural}`;
}

function statusForScore(score) {
  if (score >= 70) return { label: "Steady", className: "good" };
  if (score >= 55) return { label: "Mixed", className: "mixed" };
  return { label: "Under Pressure", className: "low" };
}

function relationshipStrength(value) {
  const magnitude = Math.abs(value);
  if (magnitude < 0.1) return "almost no";
  if (magnitude < 0.25) return "a light";
  if (magnitude < 0.45) return "a moderate";
  return "a strong";
}

function byMetric(data, metric) {
  return data
    .filter(row => row.metric === metric && row.value != null)
    .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
}

function aggregateDailyMetric(data, metric, strategy = "avg") {
  const groups = new Map();
  byMetric(data, metric).forEach(row => {
    const date = row.timestamp.slice(0, 10);
    const value = typeof row.extra?.avg === "number" ? row.extra.avg : Number(row.value);
    if (!Number.isFinite(value)) return;
    if (!groups.has(date)) groups.set(date, []);
    groups.get(date).push({ value, timestamp: row.timestamp });
  });

  return [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0])).map(([date, rows]) => {
    let value = null;
    if (strategy === "max") value = Math.max(...rows.map(row => row.value));
    else if (strategy === "last") value = rows.sort((a, b) => a.timestamp.localeCompare(b.timestamp))[rows.length - 1].value;
    else value = average(rows.map(row => row.value));
    return { date, value };
  });
}

function buildSleepRows(data) {
  const groups = new Map();
  data
    .filter(row => row.metric === "sleep_analysis" && row.value != null)
    .forEach(row => {
      const date = row.timestamp.slice(0, 10);
      const source = row.source || "";
      const key = `${date}|${source}`;
      if (!groups.has(key)) {
        groups.set(key, {
          date,
          source,
          labels: new Set(),
          sleepHours: 0,
          awakeHours: 0,
          deepHours: 0,
          remHours: 0,
          lightHours: 0
        });
      }
      const entry = groups.get(key);
      const label = row.extra?.label || "";
      const value = Number(row.value);
      if (!Number.isFinite(value)) return;
      entry.labels.add(label);
      if (label === "Awake") {
        entry.awakeHours += value;
        return;
      }
      entry.sleepHours += value;
      if (label === "Deep") entry.deepHours += value;
      else if (label === "REM") entry.remHours += value;
      else entry.lightHours += value;
    });

  const selected = new Map();
  groups.forEach(entry => {
    const totalHours = entry.sleepHours + entry.awakeHours;
    const stageCount = ["Core", "REM", "Deep"].filter(label => entry.labels.has(label)).length;
    const hasStageDetail = entry.labels.has("Awake") || entry.labels.has("Core") || entry.labels.has("REM");
    if (!hasStageDetail || totalHours < 2) return;
    const existing = selected.get(entry.date);
    const completeness = stageCount + (entry.labels.has("Awake") ? 1 : 0);
    const priority = completeness * 100 + Math.min(totalHours, 16) + (entry.source.includes("RingConn") ? 5 : 0);
    if (!existing || priority > existing.priority) selected.set(entry.date, { ...entry, priority });
  });

  return [...selected.values()]
    .map(({ priority, labels, ...entry }) => {
      const total = entry.sleepHours + entry.awakeHours;
      return {
        ...entry,
        sleepEff: total > 0 ? (entry.sleepHours / total) * 100 : null
      };
    })
    .filter(entry => entry.sleepHours > 0)
    .sort((a, b) => a.date.localeCompare(b.date));
}

function buildDailyRows(data) {
  const rhrRows = aggregateDailyMetric(data, "resting_heart_rate", "avg");
  const hrvRows = aggregateDailyMetric(data, "heart_rate_variability", "avg");
  const stepsRows = aggregateDailyMetric(data, "step_count", "max");
  const spo2Rows = aggregateDailyMetric(data, "blood_oxygen_saturation", "avg");
  const sleepRows = buildSleepRows(data);

  const map = new Map();
  function mergeRows(rows, assign) {
    rows.forEach(row => {
      if (!map.has(row.date)) map.set(row.date, { date: row.date });
      assign(map.get(row.date), row);
    });
  }

  mergeRows(rhrRows, (target, row) => {
    target.rhr = row.value;
  });
  mergeRows(hrvRows, (target, row) => {
    target.hrv = row.value;
  });
  mergeRows(stepsRows, (target, row) => {
    target.steps = row.value;
  });
  mergeRows(spo2Rows, (target, row) => {
    target.spo2 = row.value;
  });
  mergeRows(sleepRows, (target, row) => {
    target.sleepHours = row.sleepHours;
    target.sleepEff = row.sleepEff;
    target.deepHours = row.deepHours;
    target.remHours = row.remHours;
    target.lightHours = row.lightHours;
    target.awakeHours = row.awakeHours;
  });

  const rows = [...map.values()].sort((a, b) => a.date.localeCompare(b.date));
  rows.forEach(row => {
    row.score = scoreRow(row);
  });
  return rows;
}

function scoreRow(row) {
  const components = [];
  if (Number.isFinite(row.sleepHours) && Number.isFinite(row.sleepEff)) {
    components.push({ weight: 0.28, value: clamp(((row.sleepHours - 4.5) / 3.5) * 100, 0, 100) });
    components.push({ weight: 0.2, value: clamp(((row.sleepEff - 65) / 25) * 100, 0, 100) });
    components.push({ weight: 0.08, value: clamp(((row.deepHours || 0) / 2) * 100, 0, 100) });
  }
  if (Number.isFinite(row.hrv)) {
    components.push({ weight: 0.22, value: clamp(((row.hrv - 15) / 30) * 100, 0, 100) });
  }
  if (Number.isFinite(row.rhr)) {
    components.push({ weight: 0.22, value: clamp(((75 - row.rhr) / 25) * 100, 0, 100) });
  }
  if (Number.isFinite(row.steps)) {
    components.push({ weight: 0.08, value: clamp(((row.steps - 3000) / 7000) * 100, 0, 100) });
  }
  if (components.length < 2) return null;
  const totalWeight = sum(components.map(component => component.weight));
  return components.reduce((score, component) => score + component.value * component.weight, 0) / totalWeight;
}

function rollingSeries(rows, key, window) {
  return rows.map((row, index) => {
    const slice = rows.slice(Math.max(0, index - window + 1), index + 1).filter(candidate => Number.isFinite(candidate[key]));
    return {
      x: row.date,
      y: slice.length ? average(slice.map(candidate => candidate[key])) : null
    };
  }).filter(point => Number.isFinite(point.y));
}

function summarizeRows(rows) {
  return {
    count: rows.length,
    sleepCount: countFinite(rows.map(row => row.sleepHours)),
    score: average(rows.map(row => row.score)),
    sleepHours: average(rows.map(row => row.sleepHours)),
    sleepEff: average(rows.map(row => row.sleepEff)),
    rhr: average(rows.map(row => row.rhr)),
    hrv: average(rows.map(row => row.hrv)),
    steps: average(rows.map(row => row.steps)),
    spo2: average(rows.map(row => row.spo2)),
    deepHours: average(rows.map(row => row.deepHours))
  };
}

function buildWindows(rows, size = 14) {
  const complete = rows.filter(row => Number.isFinite(row.score));
  const windows = [];
  for (let i = 0; i <= complete.length - size; i += 1) {
    const slice = complete.slice(i, i + size);
    const summary = summarizeRows(slice);
    windows.push({
      ...summary,
      start: slice[0].date,
      end: slice[slice.length - 1].date
    });
  }
  return windows;
}

function buildMonthlySummaries(rows) {
  const groups = new Map();
  rows.forEach(row => {
    const month = row.date.slice(0, 7);
    if (!groups.has(month)) groups.set(month, []);
    groups.get(month).push(row);
  });
  return [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0])).map(([month, monthRows]) => {
    const summary = summarizeRows(monthRows);
    return { month, ...summary };
  });
}

function correlation(xs, ys) {
  const pairs = xs.map((value, index) => [value, ys[index]]).filter(([x, y]) => Number.isFinite(x) && Number.isFinite(y));
  if (pairs.length < 3) return 0;
  const xMean = average(pairs.map(pair => pair[0]));
  const yMean = average(pairs.map(pair => pair[1]));
  let numerator = 0;
  let xSpread = 0;
  let ySpread = 0;
  pairs.forEach(([x, y]) => {
    const dx = x - xMean;
    const dy = y - yMean;
    numerator += dx * dy;
    xSpread += dx * dx;
    ySpread += dy * dy;
  });
  const denominator = Math.sqrt(xSpread * ySpread);
  return denominator ? numerator / denominator : 0;
}

function toneClass(delta, inverse = false) {
  if (!Number.isFinite(delta)) return "";
  if (inverse) {
    if (delta < 0) return "positive";
    if (delta > 0) return "negative";
    return "";
  }
  if (delta > 0) return "positive";
  if (delta < 0) return "negative";
  return "";
}

  return statusForScore(score).className;

function buildRelationCards(dailyRows) {
  const cardioRows = dailyRows.filter(row => Number.isFinite(row.rhr) && Number.isFinite(row.hrv));
  const stepsRows = dailyRows.filter(row => Number.isFinite(row.steps) && Number.isFinite(row.hrv));
  const spo2Rows = dailyRows.filter(row => Number.isFinite(row.spo2) && Number.isFinite(row.rhr));
  const stageSleepRows = dailyRows.filter(row => Number.isFinite(row.sleepHours));
  const nextDayPairs = [];
  for (let i = 0; i < dailyRows.length - 1; i += 1) {
    const current = dailyRows[i];
    const next = dailyRows[i + 1];
    if (Number.isFinite(current.sleepHours) && Number.isFinite(next.hrv)) {
      nextDayPairs.push([current.sleepHours, next.hrv]);
    }
  }

  const rhrVsHrv = correlation(
    cardioRows.map(row => row.rhr),
    cardioRows.map(row => row.hrv)
  );
  const stepsVsHrv = correlation(
    stepsRows.map(row => row.steps),
    stepsRows.map(row => row.hrv)
  );
  const spo2VsRhr = correlation(
    spo2Rows.map(row => row.spo2),
    spo2Rows.map(row => row.rhr)
  );
  const sleepVsNextHrv = correlation(
    nextDayPairs.map(pair => pair[0]),
    nextDayPairs.map(pair => pair[1])
  );

  return [
    {
      label: "Resting HR vs HRV",
      title: `${relationshipStrength(rhrVsHrv)} inverse link`,
      value: rhrVsHrv,
      copy: `This is the clearest relationship in the archive (r=${rhrVsHrv.toFixed(2)}). When resting HR climbs, HRV usually drops too, which makes the cardio pair the most reliable recovery read on this page.`
    },
    {
      label: "SpO2 vs resting HR",
      title: `${relationshipStrength(spo2VsRhr)} pressure link`,
      value: spo2VsRhr,
      copy: `Blood oxygen does not move enough to be a lead indicator here, but it does rise slightly with higher resting HR (r=${spo2VsRhr.toFixed(2)}), which reads more like pressure than resilience.`
    },
    {
      label: "Steps vs HRV",
      title: `${relationshipStrength(stepsVsHrv)} connection`,
      value: stepsVsHrv,
      copy: `Step count explains very little of recovery quality in this dataset (r=${stepsVsHrv.toFixed(2)}). Movement volume matters less than what the cardio markers are doing afterward.`
    },
    {
      label: "Sleep carryover",
      title: stageSleepRows.length >= 5 ? `${relationshipStrength(sleepVsNextHrv)} carryover` : "Sample too thin to trust",
      value: stageSleepRows.length >= 5 ? sleepVsNextHrv : 0,
      copy: stageSleepRows.length >= 5
        ? `Longer stage-resolved nights translated into next-day HRV with ${relationshipStrength(sleepVsNextHrv)} relationship (r=${sleepVsNextHrv.toFixed(2)}).`
        : `Stage-resolved sleep only shows up on ${formatCount(stageSleepRows.length, "night")} in this archive, so next-day sleep carryover is not yet reliable enough to treat as a real relationship.`
    }
  ];
}

function render(cache) {
  renderShell();
  const dailyRows = buildDailyRows(cache.data);
  const completeRows = dailyRows.filter(row => Number.isFinite(row.score));
  const monthlySummaries = buildMonthlySummaries(completeRows);
  const windows = buildWindows(completeRows, 14);
  const relationCards = buildRelationCards(dailyRows);
  const stats = {
    days: dailyRows.length,
    sleepNights: dailyRows.filter(row => Number.isFinite(row.sleepHours)).length,
    minDate: dailyRows[0]?.date,
    maxDate: dailyRows[dailyRows.length - 1]?.date
  };

  document.getElementById("dateRange").textContent = `${formatDate(stats.minDate)} — ${formatDate(stats.maxDate)} · ${stats.days} tracked days`;
  renderOverview(dailyRows, monthlySummaries, windows, stats);
  renderInsightGrid(dailyRows, windows, [...relationCards]);
  renderRelationGrid(relationCards);
  renderMonthGrid(monthlySummaries);
  renderCharts(completeRows, monthlySummaries);
}

fetch("data/health_cache.json")
  .then(response => {
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
  })
  .then(render)
  .catch(error => {
    console.error("Failed to load wellness analysis", error);
    app.innerHTML = `<div class="error">Wellness data could not be loaded right now.</div>`;
    document.getElementById("dateRange").textContent = "Data unavailable";
  });
